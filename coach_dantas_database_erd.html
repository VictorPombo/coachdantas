
<style>
#erd { padding: 8px 0; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  profiles ||--o{ subscriptions : has
  profiles ||--o{ checkins : registers
  profiles ||--o{ class_enrollments : books
  profiles ||--o{ workouts : assigned
  profiles ||--o{ assessments : evaluated
  profiles ||--o{ profile_achievements : earns
  profiles ||--o{ store_orders : purchases

  plans ||--o{ subscriptions : offers
  modalities ||--o{ plans : categorizes
  modalities ||--o{ classes : schedules

  classes ||--o{ class_enrollments : fills
  classes ||--o{ checkins : validates

  exercises ||--o{ workout_exercises : contains
  workouts ||--o{ workout_exercises : details

  achievements ||--o{ profile_achievements : unlocks
  store_products ||--o{ store_orders : sold

  profiles {
    uuid id PK
    enum role
    text full_name
    text phone
    text goal
    text coach_notes
  }

  modalities {
    uuid id PK
    text name
    boolean is_active
  }

  plans {
    uuid id PK
    text name
    numeric price
    enum billing_cycle
    int max_sessions
  }

  subscriptions {
    uuid id PK
    uuid profile_id FK
    uuid plan_id FK
    enum status
    text asaas_customer_id
    timestamptz current_period_end
  }

  classes {
    uuid id PK
    uuid modality_id FK
    uuid instructor_id FK
    enum weekday
    time start_time
    time end_time
    text location
    int max_capacity
  }

  class_enrollments {
    uuid id PK
    uuid class_id FK
    uuid profile_id FK
    date class_date
    enum status
  }

  checkins {
    uuid id PK
    uuid profile_id FK
    uuid class_id FK
    timestamptz checked_in_at
    uuid validated_by FK
  }

  exercises {
    uuid id PK
    text name
    text muscle_group
    text video_url
    text description
  }

  workouts {
    uuid id PK
    uuid profile_id FK
    text name
    boolean is_active
  }

  workout_exercises {
    uuid id PK
    uuid workout_id FK
    uuid exercise_id FK
    int sort_order
    int sets
    text reps
    text load
    text notes
  }

  assessments {
    uuid id PK
    uuid profile_id FK
    date assessed_at
    numeric weight_kg
    int skill_strength
    int skill_mobility
    int skill_endurance
  }

  achievements {
    uuid id PK
    text name
    text icon
    text category
    int required_checkins
    int xp_reward
  }

  profile_achievements {
    uuid id PK
    uuid profile_id FK
    uuid achievement_id FK
    timestamptz unlocked_at
  }

  store_products {
    uuid id PK
    text name
    numeric price
    enum type
    boolean is_active
  }

  store_orders {
    uuid id PK
    uuid profile_id FK
    uuid product_id FK
    enum status
    text asaas_payment_id
  }

  whatsapp_templates {
    uuid id PK
    text slug
    text name
    text template
  }
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
